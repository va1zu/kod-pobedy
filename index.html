<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Код Победы | Исторический Квиз</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="george-ribbon"></div>
        
        <div id="screen-menu" class="screen active">
            <div class="menu-cover">
                <div class="logo-wrapper">
                    <div class="css-ribbon"></div>
                    <img src="orden.png" alt="Орден" class="main-logo-star">
                </div>
                <h1 class="main-title">КОД ПОБЕДЫ</h1>
                <p class="subtitle">ИСТОРИЧЕСКАЯ ХРОНИКА ВОВ</p>
            </div>
            
            <div class="content-padding">
                <h3 class="section-title"><span>ВЫБЕРИТЕ ОПЕРАЦИЮ</span></h3>
                <div id="game-list-container" class="button-group">
                    <p class="text-center text-muted">Загрузка данных...</p>
                </div>
                <hr class="divider">
                <button onclick="window.showLeaderboard()" class="btn-alt">⭐ ДОСКА ПОЧЁТА</button>
                <button onclick="window.showLogin()" class="btn-text">Служебный вход</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
